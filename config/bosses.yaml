# Each boss entry uses the canonical (display) name as the key.
# - aliases: alternative names / abbreviations users may type
# - respawn: fixed respawn time in hours (window start offset from ToD)
# - random: random window duration in hours (window end = respawn + random)
#
# Bosses not listed here use the default window configured via
# TOD_WINDOW_START and TOD_WINDOW_RANDOM environment variables (default: 12h + 9h).

bosses:
